[server]
headless = true
maxUploadSize = 10

[client]
toolbarMode = "minimal"

[theme]
# Dark is the base — Streamlit propagates these to every sub-component
# (tooltips, dataframe canvas, dropdowns, tab panels, etc.) automatically.
# Light mode is applied at runtime via CSS injection in ui/theme.py.
base = "dark"
primaryColor      = "#4CAF50"
backgroundColor   = "#0e1117"
secondaryBackgroundColor = "#161b22"
textColor         = "#e6edf3"
